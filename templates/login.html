<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - TACACS+ NG WebGUI</title>
    <!-- FontAwesome for Premium Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <!-- Import Google Outfit Font -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --font-sans: 'Outfit', sans-serif;
            --bg-primary: #060913;
            --bg-card: rgba(15, 23, 42, 0.45);
            --border-color: rgba(255, 255, 255, 0.08);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent-emerald: #10b981;
            --accent-indigo: #6366f1;
            --accent-rose: #f43f5e;
            --accent-rose-glow: rgba(244, 63, 94, 0.15);
            --transition-smooth: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-primary);
            background-image: 
                radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(16, 185, 129, 0.08) 0px, transparent 50%);
            background-attachment: fixed;
            color: var(--text-primary);
            font-family: var(--font-sans);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            overflow: hidden;
        }

        .login-container {
            width: 420px;
            max-width: 100%;
            background: var(--bg-card);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 3rem 2.5rem;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
            position: relative;
            overflow: hidden;
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .login-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.02), transparent);
            pointer-events: none;
        }

        .brand-header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .brand-logo {
            background: linear-gradient(135deg, var(--accent-emerald), var(--accent-indigo));
            width: 54px;
            height: 54px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            color: white;
            font-size: 1.5rem;
            margin: 0 auto 1rem auto;
            box-shadow: 0 0 25px rgba(16, 185, 129, 0.4);
        }

        .brand-title {
            font-size: 1.75rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            background: linear-gradient(to right, #ffffff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .brand-subtitle {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-top: 0.25rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-label {
            display: block;
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 0.5rem;
            color: var(--text-secondary);
        }

        .input-icon-container {
            position: relative;
        }

        .input-icon-container i {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-secondary);
            font-size: 1rem;
            transition: var(--transition-smooth);
        }

        .form-control-premium {
            width: 100%;
            background-color: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 0.85rem 1rem 0.85rem 2.75rem;
            color: white;
            font-family: var(--font-sans);
            font-size: 0.95rem;
            transition: var(--transition-smooth);
            outline: none;
        }

        .form-control-premium:focus {
            border-color: var(--accent-indigo);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.15);
            background-color: rgba(15, 23, 42, 0.85);
        }

        .form-control-premium:focus + i {
            color: var(--accent-indigo);
        }

        .btn-premium-indigo {
            width: 100%;
            background: linear-gradient(135deg, var(--accent-indigo), #4f46e5);
            border: none;
            border-radius: 12px;
            color: white;
            font-family: var(--font-sans);
            font-weight: 600;
            font-size: 0.95rem;
            padding: 0.9rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3);
            transition: var(--transition-smooth);
            margin-top: 2rem;
        }

        .btn-premium-indigo:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(99, 102, 241, 0.5);
        }

        .alert-error {
            background-color: var(--accent-rose-glow);
            border: 1px solid rgba(244, 63, 94, 0.25);
            border-radius: 10px;
            padding: 0.75rem 1rem;
            color: #fda4af;
            font-size: 0.85rem;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            animation: shake 0.4s ease;
        }

        .system-info {
            text-align: center;
            margin-top: 2.5rem;
            font-size: 0.75rem;
            color: var(--text-secondary);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-4px); }
            75% { transform: translateX(4px); }
        }
    </style>
</head>
<body>

<div class="login-container">
    <div class="brand-header">
        <div class="brand-logo">T</div>
        <h1 class="brand-title">TACACS+ NG</h1>
        <p class="brand-subtitle">Panel de Administración Web AAA</p>
    </div>

    {% if error %}
    <div class="alert-error">
        <i class="fa-solid fa-circle-exclamation"></i>
        <span>{{ error }}</span>
    </div>
    {% endif %}

    <form action="/login" method="POST">
        <div class="form-group">
            <label class="form-label">Nombre de Usuario</label>
            <div class="input-icon-container">
                <input type="text" name="username" class="form-control-premium" required placeholder="Ej. admin" autofocus autocomplete="username">
                <i class="fa-solid fa-user"></i>
            </div>
        </div>

        <div class="form-group">
            <label class="form-label">Contraseña</label>
            <div class="input-icon-container">
                <input type="password" name="password" class="form-control-premium" required placeholder="••••••••••••" autocomplete="current-password">
                <i class="fa-solid fa-lock"></i>
            </div>
        </div>

        <button type="submit" class="btn-premium-indigo">
            <i class="fa-solid fa-right-to-bracket"></i> Acceder a la WebGUI
        </button>
    </form>

    <div class="system-info">
        <i class="fa-solid fa-shield-halved"></i> Autenticación de la WebGUI activa
    </div>
</div>

</body>
</html>
